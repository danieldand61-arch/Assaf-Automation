name: Scraper Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scraper-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper regression tests
        run: pytest tests/test_scraper_regression.py -v -s --tb=short
